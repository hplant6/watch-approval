name: WatchApproval
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    watchOS: "10.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "4" # Apple Watch

targets:
  WatchApproval:
    type: application.watchapp
    platform: watchOS
    sources:
      - path: WatchApproval
        type: group
    settings:
      base:
        INFOPLIST_FILE: WatchApproval/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.example.WatchApproval.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "" # Set your Team ID here
    dependencies: []
    entitlements:
      path: WatchApproval/WatchApproval.entitlements
      properties:
        aps-environment: development
    preBuildScripts:
      - name: "SwiftLint"
        script: |
          if which swiftlint > /dev/null; then
            swiftlint
          fi
        basedOnDependencyAnalysis: false
